<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ivy Digital Card</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:"Noto Sans TC",sans-serif;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#FFD9EC;

transition:background 1s;

}

/* 卡片 */

.card{

background:white;
padding:45px;

border-radius:24px;

width:340px;
max-width:90%;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,0.12);

animation:float 4s ease-in-out infinite;

}

/* 浮動動畫 */

@keyframes float{

0%{transform:translateY(0px)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0px)}

}

/* 大頭照 */

.avatar{

width:130px;
height:130px;

border-radius:50%;

object-fit:cover;

margin-bottom:15px;

transition:0.4s;

}

.avatar:hover{

transform:rotate(6deg) scale(1.07);

}

/* 名字 */

h1{

font-size:24px;
margin-bottom:6px;

}

/* 副標題 */

.subtitle{

color:#888;
font-size:14px;
margin-bottom:16px;

}

/* 自我介紹 */

.bio{

font-size:14px;
line-height:1.7;

color:#444;

margin-bottom:25px;

}

/* 按鈕區 */

.buttons{

display:flex;
justify-content:center;
gap:12px;

flex-wrap:wrap;

}

/* 按鈕 */

button{

border:none;

padding:10px 18px;

border-radius:22px;

cursor:pointer;

background:#333;
color:white;

font-size:14px;

transition:0.3s;

}

/* hover */

button:hover{

transform:translateY(-3px);

box-shadow:0 8px 18px rgba(0,0,0,0.15);

background:#555;

}

</style>

</head>

<body onclick="changeColor()">

<div class="card">

<img src="https://github.com/YinRLin/digital-card/blob/401ebef835ea52e35f1599c195cece865e7fd96f/avatar.jpg" class="avatar">

<h1>林映榕</h1>

<div class="subtitle">
NTUST
</div>

<div class="bio">

嗨！我是台科大資安所碩二的學生 ✨  
平常喜歡研究資訊安全、AI，以及探索各種有趣的新科技。  
如果你也對資安或科技有興趣，歡迎一起交流！

</div>

<div class="buttons">

<button onclick="window.open('https://www.instagram.com/ivy.1121_/')">
Instagram
</button>

<button onclick="window.open('https://github.com')">
GitHub
</button>

<button onclick="location.href='mailto:test@email.com'">
Email
</button>

</div>

</div>

<script>

const colors=[

"#FFD9EC",   // 粉
"#D9F1FF",   // 淺藍
"#E9D9FF"    // 淺紫

]

let index=0

function changeColor(){

index++

if(index>=colors.length){
index=0
}

document.body.style.backgroundColor=colors[index]

}

/* 每三秒自動換背景 */

setInterval(changeColor,3000)

</script>

</body>

</html>
